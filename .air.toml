# Air: Go용 nodemon류 핫 리로드 (https://github.com/air-verse/air)
root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  args_bin = []
  bin = "./tmp/main.exe"
  cmd = "go build -buildvcs=false -o ./tmp/main.exe ./cmd/server"
  delay = 100
  exclude_dir = ["tmp", "testdata", "vendor", "node_modules", ".git", "bin", "assets", "scripts"]
  exclude_regex = ["_test\\.go$"]
  exclude_unchanged = false
  follow_symlink = false
  include_ext = ["go", "mod", "sum", "env"]
  kill_delay = "0s"
  log = "tmp/air-build-errors.log"
  poll = false
  poll_interval = 0
  post_cmd = []
  pre_cmd = []
  rerun = false
  rerun_delay = 500
  send_interrupt = true
  shell = ""
  stop_on_error = true

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  silent = false
  time = false

[misc]
  clean_on_exit = true

[proxy]
  enabled = false

[screen]
  clear_on_rebuild = true
  keep_scroll = true
